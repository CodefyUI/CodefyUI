[plugin]
id              = "c5"
name            = "Chapter 5 — 強化學習"
version         = "0.1.0"
description     = "Reinforcement learning teaching nodes for textbook chapter C5. EduPolicyGradient performs one REINFORCE step with every intermediate (softmax / gathered probs / advantages / loss) exposed."
schema_version  = 1
requires_codefyui = ">=0.2.0"

[content]
nodes_dir    = "nodes"
examples_dir = "examples"

[lessons]
chapters = ["C5"]
lessons  = ["C5-1", "C5-2"]
