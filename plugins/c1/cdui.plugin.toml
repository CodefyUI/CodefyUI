[plugin]
id              = "c1"
name            = "Chapter 1 — 基本資訊"
version         = "0.1.0"
description     = "Data inspection nodes for textbook chapter C1. EduColumnStats walks the column-wise sum → mean → variance → std chain step by step so the Inspector can show every intermediate."
schema_version  = 1
requires_codefyui = ">=0.2.0"

[content]
nodes_dir    = "nodes"
examples_dir = "examples"

[lessons]
chapters = ["C1"]
lessons  = ["C1-2"]

# Virtual "chapter pack" section rendered at the bottom of the node palette.
# `nodes` is an ordered, de-duplicated list of qualified node names
# (e.g. "CSVReader", "c1:EduFilterRows") that this chapter uses. They show
# up as a single grouped section in the UI while staying available in their
# original CATEGORY — same node, two entry points. The display strips the
# `<plugin>:` namespace prefix; drag payload keeps it.
[chapter_pack]
label    = "C1 — 基本資訊"
position = 100
nodes    = [
  "Start",
  "CSVReader",
  "ColumnSelector",
  "Squeeze",
  "Mean",
  "Print",
  "c1:EduColumnStats",
  "c1:EduFilterRows",
]
