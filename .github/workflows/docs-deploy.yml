name: Docs Deploy

# Build the Docusaurus documentation site (docs/) and deploy it to GitHub Pages.
# Runs on every push to main that touches the docs, and can be triggered manually.
# Set the Pages source to "GitHub Actions" in repo Settings → Pages.
on:
  push:
    branches:
      - main
    paths:
      - 'docs/**'
      - '.github/workflows/docs-deploy.yml'
  workflow_dispatch:

# Least-privilege token plus the permissions the Pages deployment needs.
permissions:
  contents: read
  pages: write
  id-token: write

# Allow only one concurrent Pages deployment; let an in-flight run finish.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    name: Build (Docusaurus)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v6
        with:
          # Matches the pnpm major that generated docs/pnpm-lock.yaml.
          version: 10

      - uses: actions/setup-node@v5
        with:
          node-version: '24'
          cache: 'pnpm'
          cache-dependency-path: docs/pnpm-lock.yaml

      - name: Install (frozen lockfile)
        working-directory: docs
        run: pnpm install --frozen-lockfile

      - name: Build
        working-directory: docs
        run: pnpm build

      - uses: actions/configure-pages@v5

      - uses: actions/upload-pages-artifact@v3
        with:
          path: docs/build

  deploy:
    name: Deploy to GitHub Pages
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
