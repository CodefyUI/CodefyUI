name: Release Build

# Build the prebuilt frontend bundle and attach it to the GitHub release.
# Triggers cover all the ways a release can be created:
#   - push tags        — `git push --tags` (most common)
#   - release: created — UI-created release with a pre-existing tag
#                        (covers the case where the tag was pushed earlier
#                        but no matching release existed yet)
#   - workflow_dispatch — manual rebuild against a specified tag
on:
  push:
    tags:
      - '*.*.*'        # 1.2.3
      - '*.*.*rc*'     # 1.0.0rc9
      - 'v*.*.*'       # v1.2.3 (in case the convention shifts)
  release:
    types: [created]
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag to attach the asset to (leave blank to upload as artifact only)'
        required: false

# Serialize per-tag so re-pushing a tag (or a UI publish racing a tag-push run)
# can't end up with two action-gh-release calls fighting over the same asset.
concurrency:
  group: release-build-${{ github.event.release.tag_name || github.ref_name || inputs.tag }}
  cancel-in-progress: true

jobs:
  build-frontend-dist:
    name: Build frontend-dist.tar.gz
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: write   # required for action-gh-release to upload assets
    steps:
      - name: Resolve tag
        id: resolve
        shell: bash
        env:
          EVENT: ${{ github.event_name }}
          REL_TAG: ${{ github.event.release.tag_name }}
          REF_NAME: ${{ github.ref_name }}
          INPUT_TAG: ${{ inputs.tag }}
        run: |
          case "$EVENT" in
            release)           tag="$REL_TAG" ;;
            push)              tag="$REF_NAME" ;;
            workflow_dispatch) tag="$INPUT_TAG" ;;
            *)                 tag="" ;;
          esac
          # Auto-detect pre-release flag from tag name. Pre-1.0 conventions
          # like "rc", "beta", "alpha", "dev" all mean "not stable".
          prerelease=false
          shopt -s nocasematch
          if [[ "$tag" =~ (rc|beta|alpha|dev) ]]; then
            prerelease=true
          fi
          echo "tag=$tag" >> "$GITHUB_OUTPUT"
          echo "prerelease=$prerelease" >> "$GITHUB_OUTPUT"
          echo "Resolved tag: '$tag' (event=$EVENT, prerelease=$prerelease)"

      # Always check out the tag's commit so the asset matches what's tagged,
      # not whatever main looked like at workflow start time. Need full history
      # for the tag annotation read-back step below.
      - uses: actions/checkout@v6
        with:
          ref: ${{ steps.resolve.outputs.tag || github.ref }}
          fetch-depth: 0
          fetch-tags: true

      - name: Read tag annotation as release body
        id: tagmsg
        shell: bash
        env:
          TAG: ${{ steps.resolve.outputs.tag }}
        run: |
          # Pull the annotated tag's message. `%(contents)` includes the
          # subject + body (and strips PGP sig if any).
          msg="$(git tag -l --format='%(contents)' "$TAG")"
          if [[ -z "$msg" ]]; then
            # Lightweight tag (no -m) — fall back to the commit subject so the
            # release isn't completely empty.
            msg="$(git log -1 --format='%s%n%n%b' "$TAG")"
          fi
          # Write to a file: avoids GITHUB_OUTPUT heredoc quoting hazards
          # for messages with backticks / dollars / EOF lines.
          printf '%s\n' "$msg" > release-body.md
          echo "Tag message ($(wc -l < release-body.md) lines):"
          head -20 release-body.md

      - uses: pnpm/action-setup@v4
        with:
          # Pin to the major that matches frontend/pnpm-lock.yaml. Floating to
          # `latest` would silently break `pnpm install --frozen-lockfile`
          # when pnpm cuts a new major.
          version: 9

      - uses: actions/setup-node@v5
        with:
          node-version: '24'
          cache: 'pnpm'
          cache-dependency-path: frontend/pnpm-lock.yaml

      - name: Install frontend deps
        working-directory: frontend
        run: pnpm install --frozen-lockfile

      - name: Build frontend
        working-directory: frontend
        run: pnpm build

      - name: Verify dist contents
        run: |
          test -f frontend/dist/index.html
          test -d frontend/dist/assets
          ls -la frontend/dist
          ls -la frontend/dist/assets

      - name: Package dist
        id: pack
        run: |
          # Pack from inside the dist dir so extraction lands cleanly with
          # `tar -xzf frontend-dist.tar.gz -C frontend/dist` (no strip needed).
          tar -czf frontend-dist.tar.gz -C frontend/dist .
          size_bytes=$(stat -c%s frontend-dist.tar.gz)
          size_human=$(du -h frontend-dist.tar.gz | cut -f1)
          {
            echo "size_bytes=$size_bytes"
            echo "size_human=$size_human"
          } >> "$GITHUB_OUTPUT"
          ls -la frontend-dist.tar.gz

      - name: Upload as artifact (workflow_dispatch path)
        if: github.event_name == 'workflow_dispatch'
        uses: actions/upload-artifact@v7
        with:
          name: frontend-dist
          path: frontend-dist.tar.gz
          retention-days: 30

      # Use gh CLI directly instead of softprops/action-gh-release to avoid a
      # known bug: when there's an existing draft release for the same tag,
      # softprops can create a *duplicate* release instead of updating the
      # draft, leaving GitHub with two records for one tag.
      - name: Create or update release
        if: github.event_name != 'workflow_dispatch' || inputs.tag != ''
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
          TAG: ${{ steps.resolve.outputs.tag }}
          PRERELEASE: ${{ steps.resolve.outputs.prerelease }}
          EVENT: ${{ github.event_name }}
        run: |
          set -euo pipefail

          # Find any existing release for this tag (drafts included).
          existing_id=$(gh api "repos/$REPO/releases" \
            --paginate \
            --jq ".[] | select(.tag_name==\"$TAG\") | .id" | head -1 || true)

          # `release: created` means the maintainer already created a release
          # via the UI — preserve their draft/published choice. For tag push
          # and dispatch we always create/keep as draft so the maintainer can
          # review notes before publishing.
          if [[ "$EVENT" == "release" ]]; then
            preserve_draft=true
          else
            preserve_draft=false
          fi

          body="$(cat release-body.md)"

          # IMPORTANT: GitHub rejects make_latest=true with HTTP 422 when the
          # release is still a draft. We therefore only flip make_latest in
          # the PATCH that targets an *already-published* release; for draft
          # creates/updates we omit it and let the maintainer's "Publish
          # release" click (or a follow-up step) do the flip.
          if [[ -n "$existing_id" ]]; then
            echo "Updating existing release $existing_id"
            if [[ "$preserve_draft" == "true" ]]; then
              # UI-created release: don't change draft state. Read current
              # draft flag so we can decide whether make_latest is allowed.
              is_draft="$(gh api "repos/$REPO/releases/$existing_id" --jq '.draft')"
              patch_args=( -X PATCH "repos/$REPO/releases/$existing_id"
                           -f tag_name="$TAG"
                           -f name="$TAG"
                           -F prerelease="$PRERELEASE"
                           -f body="$body" )
              if [[ "$is_draft" == "false" ]]; then
                patch_args+=( -f make_latest=true )
              fi
              gh api "${patch_args[@]}"
            else
              # Tag-push / dispatch: always (re-)assert draft=true so the
              # maintainer reviews notes before publishing. make_latest is
              # invalid while draft=true and is intentionally omitted.
              gh api -X PATCH "repos/$REPO/releases/$existing_id" \
                -f tag_name="$TAG" \
                -f name="$TAG" \
                -F draft=true \
                -F prerelease="$PRERELEASE" \
                -f body="$body"
            fi
          else
            echo "Creating new draft release for $TAG"
            gh api -X POST "repos/$REPO/releases" \
              -f tag_name="$TAG" \
              -f name="$TAG" \
              -F draft=true \
              -F prerelease="$PRERELEASE" \
              -f body="$body"
          fi

      - name: Upload frontend-dist.tar.gz to release
        if: github.event_name != 'workflow_dispatch' || inputs.tag != ''
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ steps.resolve.outputs.tag }}
        run: |
          # `--clobber` overwrites a previously uploaded asset of the same
          # name; without it a re-run would fail on conflict.
          gh release upload "$TAG" frontend-dist.tar.gz --clobber

      - name: Build summary
        if: always()
        run: |
          {
            echo "### Release Build Summary"
            echo ""
            echo "| Field | Value |"
            echo "|-------|-------|"
            echo "| Tag        | \`${{ steps.resolve.outputs.tag }}\` |"
            echo "| Commit SHA | \`${{ github.sha }}\` |"
            echo "| Event      | \`${{ github.event_name }}\` |"
            echo "| Asset size | ${{ steps.pack.outputs.size_human }} |"
          } >> "$GITHUB_STEP_SUMMARY"
